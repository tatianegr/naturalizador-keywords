<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naturalizador de Keywords SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text-muted: #888480;
      --text-dim: #555250;
      --accent: #c9b97a;
      --accent-dim: rgba(201,185,122,0.12);
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    header p {
      margin-top: 0.75rem;
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus { border-color: var(--border-hover); }

    .btn-add {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 16px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-add:hover { border-color: var(--border-hover); color: var(--text); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
      margin-bottom: 1.5rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 0.5px solid rgba(201,185,122,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(201,185,122,0.5);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag button:hover { color: var(--accent); }

    .empty-msg {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      padding: 4px 0;
    }

    .btn-run {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-run:hover { opacity: 0.9; }
    .btn-run:active { transform: scale(0.99); }
    .btn-run:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .results {
      width: 100%;
      max-width: 560px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .result-origin {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
      gap: 12px;
    }

    .suggestion:last-child { border-bottom: none; }

    .suggestion span {
      font-size: 14px;
      color: var(--text);
      font-weight: 300;
      line-height: 1.4;
    }

    .btn-copy {
      background: none;
      border: 0.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-copy:hover { border-color: var(--border-hover); color: var(--text-muted); }
    .btn-copy.copied { color: var(--accent); border-color: rgba(201,185,122,0.3); }

    footer {
      margin-top: 4rem;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      .input-row { flex-direction: column; }
      .btn-add { padding: 10px; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">ferramenta SEO</p>
  <h1>Naturalizador de Keywords</h1>
  <p>Cole uma palavra-chave SEO e receba variações gramaticalmente naturais para usar no seu texto.</p>
</header>

<div class="card">
  <p class="field-label">Palavras-chave</p>
  <div class="input-row">
    <input type="text" id="kwInput" placeholder="ex: fornecedor cabo elétrico sp" autocomplete="off" />
    <button class="btn-add" onclick="addKeyword()">+ Adicionar</button>
  </div>
  <div class="tags" id="tags">
    <span class="empty-msg" id="emptyMsg">Nenhuma keyword adicionada ainda.</span>
  </div>
  <button class="btn-run" id="runBtn" onclick="run()" disabled>Naturalizar keywords</button>
</div>

<div class="results" id="resultsEl"></div>

<footer>feito por <a href="https://www.linkedin.com/in/tati-redatora/" target="_blank">tati redatora</a></footer>

<script>
const keywords = [];

const intencoes = {
  comprar:'comprar',compre:'comprar',compra:'comprar',adquirir:'adquirir',
  preco:'preco',preço:'preco',valor:'preco',valores:'preco',custo:'preco',custos:'preco',
  barato:'barato',baratos:'barato',economico:'barato',econômico:'barato',economica:'barato',
  econômica:'barato',acessivel:'barato',acessível:'barato',promocao:'preco',promoção:'preco',
  orcamento:'orcamento',orçamento:'orcamento',cotacao:'orcamento',cotação:'orcamento',
  melhor:'qualidade',melhores:'qualidade',qualidade:'qualidade',premium:'qualidade',top:'qualidade',
  fornecedor:'fornecedor',fornecedores:'fornecedor',fabricante:'fornecedor',fabricantes:'fornecedor',
  distribuidor:'fornecedor',distribuidores:'fornecedor',loja:'fornecedor',lojas:'fornecedor',
  empresa:'fornecedor',empresas:'fornecedor',especialista:'fornecedor',especialistas:'fornecedor',
  instalacao:'servico',instalação:'servico',instalar:'servico',instaladora:'servico',
  servico:'servico',serviço:'servico',servicos:'servico',serviços:'servico',
  manutencao:'servico',manutenção:'servico',
  contato:'contato',contratar:'contato',
};

const estados = ['ac','al','ap','am','ba','ce','df','es','go','ma','mt','ms','mg','pa','pb','pr','pe','pi','rj','rn','rs','ro','rr','sc','sp','se','to'];
const cidades = ['sao paulo','são paulo','rio de janeiro','belo horizonte','curitiba','porto alegre','fortaleza','recife','salvador','manaus','campinas','santo andre','guarulhos','osasco','sorocaba','ribeirao preto','ribeirão preto','santos'];

function pluralizar(word) {
  const w = word.toLowerCase();
  if (w.endsWith('ção')||w.endsWith('são')) return word.slice(0,-2)+'ões';
  if (w.endsWith('al')) return word.slice(0,-2)+'ais';
  if (w.endsWith('el')) return word.slice(0,-2)+'éis';
  if (w.endsWith('ol')) return word.slice(0,-2)+'óis';
  if (w.endsWith('ul')) return word.slice(0,-2)+'uis';
  if (w.endsWith('il')) return word.slice(0,-2)+'is';
  if (w.endsWith('m')) return word.slice(0,-1)+'ns';
  if (w.endsWith('r')||w.endsWith('s')||w.endsWith('z')) return word+'es';
  return word+'s';
}

function normalizar(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'');
}

function detectarLocalizacao(tokens) {
  const joined = tokens.join(' ');
  for (const c of cidades) {
    if (joined.includes(c)) return c.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  }
  for (const t of tokens) {
    if (estados.includes(normalizar(t))) return t.toUpperCase();
  }
  return null;
}

function artigoFeminino(palavra) {
  const femininas = ['empresa','loja','instalação','instalacao','manutenção','manutencao','cotação','cotacao','qualidade','solução','solucao'];
  const norm = normalizar(palavra);
  if (femininas.some(f=>norm.includes(f))) return true;
  if (norm.endsWith('a')||norm.endsWith('ção')||norm.endsWith('cao')||norm.endsWith('são')||norm.endsWith('sao')||norm.endsWith('dade')) return true;
  return false;
}

function capitalize(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

function naturalizar(kw) {
  const tokens = kw.trim().split(/\s+/);
  const norm = tokens.map(normalizar);
  let intencao=null, intencaoTipo=null;
  const localizacao = detectarLocalizacao(norm);
  let nucleoTokens = [];

  for (let i=0;i<tokens.length;i++) {
    const n = norm[i];
    if (intencoes[n]&&!intencao) { intencao=tokens[i]; intencaoTipo=intencoes[n]; }
    else if (estados.includes(n)||(localizacao&&localizacao.toLowerCase().includes(tokens[i].toLowerCase()))) {}
    else { nucleoTokens.push(tokens[i]); }
  }

  if (localizacao) {
    const locNorm = normalizar(localizacao);
    nucleoTokens = nucleoTokens.filter(t=>!locNorm.includes(normalizar(t)));
  }

  const nucleo = nucleoTokens.join(' ');
  const nucleoPlural = nucleoTokens.map((t,i)=>i===nucleoTokens.length-1?pluralizar(t):t).join(' ');
  const fem = artigoFeminino(nucleo);
  const artDef = fem?'a':'o';
  const artIndef = fem?'uma':'um';
  const artDefPl = fem?'as':'os';
  const loc = localizacao?(estados.includes(normalizar(localizacao))?` em ${localizacao}`:` em ${localizacao}`):'';

  const sugestoes = new Set();

  if (!intencaoTipo||intencaoTipo==='fornecedor') {
    sugestoes.add(capitalize(`${nucleoPlural}${loc}`));
    sugestoes.add(capitalize(`fornecedor de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`onde comprar ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${artDefPl} melhores ${nucleoPlural}${loc}`));
    sugestoes.add(capitalize(`empresa de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`distribuidor de ${nucleo}${loc}`));
  }
  if (intencaoTipo==='preco') {
    sugestoes.add(capitalize(`preço de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`quanto custa ${artIndef} ${nucleo}${loc}`));
    sugestoes.add(capitalize(`valor do ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${nucleo} com melhor preço${loc}`));
    sugestoes.add(capitalize(`tabela de preços de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${nucleoPlural} por bom preço${loc}`));
  }
  if (intencaoTipo==='barato') {
    sugestoes.add(capitalize(`${nucleo} barato${loc}`));
    sugestoes.add(capitalize(`${nucleo} com preço acessível${loc}`));
    sugestoes.add(capitalize(`onde encontrar ${nucleo} barato${loc}`));
    sugestoes.add(capitalize(`${nucleoPlural} econômicos${loc}`));
    sugestoes.add(capitalize(`melhor custo-benefício em ${nucleo}${loc}`));
  }
  if (intencaoTipo==='orcamento') {
    sugestoes.add(capitalize(`orçamento de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`solicitar orçamento de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`cotação de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`pedir orçamento para ${nucleo}${loc}`));
    sugestoes.add(capitalize(`quanto custa contratar ${nucleo}${loc}`));
  }
  if (intencaoTipo==='qualidade') {
    sugestoes.add(capitalize(`${nucleo} de qualidade${loc}`));
    sugestoes.add(capitalize(`melhor ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${artDef} melhor ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${nucleoPlural} de alta qualidade${loc}`));
    sugestoes.add(capitalize(`${nucleo} premium${loc}`));
  }
  if (intencaoTipo==='servico') {
    sugestoes.add(capitalize(`serviço de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`empresa de ${nucleo}${loc}`));
    sugestoes.add(capitalize(`contratar ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${nucleo} profissional${loc}`));
    sugestoes.add(capitalize(`quem faz ${nucleo}${loc}`));
  }
  if (intencaoTipo==='contato') {
    sugestoes.add(capitalize(`contratar ${nucleo}${loc}`));
    sugestoes.add(capitalize(`entrar em contato com ${nucleo}${loc}`));
    sugestoes.add(capitalize(`falar com especialista em ${nucleo}${loc}`));
    sugestoes.add(capitalize(`onde contratar ${nucleo}${loc}`));
  }
  if (intencaoTipo==='comprar') {
    sugestoes.add(capitalize(`comprar ${nucleo}${loc}`));
    sugestoes.add(capitalize(`onde comprar ${nucleo}${loc}`));
    sugestoes.add(capitalize(`adquirir ${nucleo}${loc}`));
    sugestoes.add(capitalize(`${nucleo} à venda${loc}`));
    sugestoes.add(capitalize(`loja de ${nucleo}${loc}`));
  }

  return [...sugestoes].slice(0,6);
}

// UI
const input = document.getElementById('kwInput');
const tagsEl = document.getElementById('tags');
const emptyMsg = document.getElementById('emptyMsg');
const runBtn = document.getElementById('runBtn');
const resultsEl = document.getElementById('resultsEl');

input.addEventListener('keydown', e=>{ if(e.key==='Enter') addKeyword(); });

function addKeyword() {
  const val = input.value.trim();
  if (!val||keywords.includes(val)) { input.value=''; return; }
  keywords.push(val);
  input.value='';
  renderTags();
}

function removeKeyword(idx) {
  keywords.splice(idx,1);
  renderTags();
}

function renderTags() {
  tagsEl.innerHTML='';
  if (keywords.length===0) { tagsEl.appendChild(emptyMsg); runBtn.disabled=true; return; }
  runBtn.disabled=false;
  keywords.forEach((kw,i)=>{
    const tag=document.createElement('div');
    tag.className='tag';
    tag.innerHTML=`<span>${kw}</span><button onclick="removeKeyword(${i})">×</button>`;
    tagsEl.appendChild(tag);
  });
}

function run() {
  resultsEl.innerHTML='';
  keywords.forEach((kw,idx)=>{
    const sugestoes=naturalizar(kw);
    const card=document.createElement('div');
    card.className='result-card';
    card.style.animationDelay=`${idx*0.08}s`;
    const origin=document.createElement('div');
    origin.className='result-origin';
    origin.textContent=`"${kw}"`;
    card.appendChild(origin);
    sugestoes.forEach(s=>{
      const row=document.createElement('div');
      row.className='suggestion';
      const span=document.createElement('span');
      span.textContent=s;
      const btn=document.createElement('button');
      btn.className='btn-copy';
      btn.textContent='copiar';
      btn.onclick=()=>{
        navigator.clipboard.writeText(s).then(()=>{
          btn.textContent='copiado ✓';
          btn.classList.add('copied');
          setTimeout(()=>{ btn.textContent='copiar'; btn.classList.remove('copied'); },1800);
        });
      };
      row.appendChild(span);
      row.appendChild(btn);
      card.appendChild(row);
    });
    resultsEl.appendChild(card);
  });
}
</script>
</body>
</html>
