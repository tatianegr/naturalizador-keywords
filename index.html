<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naturalizador de Keywords SEO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05070d;
      --panel: #0a0d14;
      --panel-2: #0f1420;
      --border: #1e2840;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --accent-dim: rgba(79,140,255,0.12);
      --output-bg: #06080f;
      --footer: #8f9ab3;
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }
    * { scrollbar-color: var(--panel-2) var(--bg); scrollbar-width: thin; }

    header {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    header .eyebrow {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
    }

    header p {
      margin-top: 0.75rem;
      font-size: 15px;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }

    .field-label {
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1rem;
    }

    textarea#kwInput {
      width: 100%;
      resize: vertical;
      min-height: 64px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    textarea#kwInput::placeholder { color: var(--muted); }
    textarea#kwInput:focus { border-color: var(--accent); }

    .btn-add {
      align-self: flex-end;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-add:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,140,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 14px;
      color: var(--accent);
      font-family: Arial, sans-serif;
      font-weight: 400;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(79,140,255,0.6);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag button:hover { color: var(--accent); }

    .empty-msg {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      padding: 4px 0;
    }

    .results {
      width: 100%;
      max-width: 560px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: var(--output-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
    }

    .result-card:hover {
      border-color: var(--accent-hover);
      background: var(--panel-2);
      transform: translateY(-1px);
    }

    .result-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .result-origin {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .result-text {
      font-size: 18px;
      color: var(--text);
      font-weight: 400;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    .btn-copy {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 16px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
    .btn-copy.copied { background: #1a3a1a; color: #6fcf6f; border-color: #3a6a3a; }

    footer {
      margin-top: 4rem;
      font-size: 13px;
      color: var(--footer);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    footer a { color: var(--footer); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      header h1 { font-size: 24px; }
      .result-text { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">ferramenta SEO</p>
  <h1>Naturalizador de Keywords</h1>
  <p>Cole uma palavra-chave SEO e receba a versão naturalizada, com conectivos, para usar no seu texto.</p>
</header>

<div class="card">
  <p class="field-label">Palavras-chave</p>
  <div class="input-row">
    <textarea id="kwInput" placeholder="cole uma ou mais palavras-chave, uma por linha&#10;ex: fornecedor cabo elétrico sp" rows="3" autocomplete="off"></textarea>
    <button class="btn-add" onclick="addKeyword()">+ Adicionar</button>
  </div>
  <div class="tags" id="tags">
    <span class="empty-msg" id="emptyMsg">Nenhuma keyword adicionada ainda.</span>
  </div>
</div>

<div class="results" id="resultsEl"></div>

<footer>feito por <a href="https://www.linkedin.com/in/tati-redatora/" target="_blank">tati redatora</a></footer>

<script>
const keywords = [];

const estados = ['ac','al','ap','am','ba','ce','df','es','go','ma','mt','ms','mg','pa','pb','pr','pe','pi','rj','rn','rs','ro','rr','sc','sp','se','to'];
const cidades = ['São Paulo','Rio de Janeiro','Belo Horizonte','Curitiba','Porto Alegre','Fortaleza','Recife','Salvador','Manaus','Campinas','Santo André','Guarulhos','Osasco','Sorocaba','Ribeirão Preto','Santos'];

// substantivos cujo complemento é naturalmente ligado por "de" (ex: "fornecedor de cabos")
const precisaDe = new Set([
  'fornecedor','fornecedores','fabricante','fabricantes','distribuidor','distribuidores',
  'loja','lojas','empresa','empresas','especialista','especialistas',
  'instalacao','instalador','instaladora','manutencao','servico','servicos',
  'preco','precos','valor','valores','orcamento','cotacao','tabela',
  'aluguel','conserto','reparo','reparos','troca','venda','vendas','fornecimento',
]);

// alvos/aplicações que naturalmente vêm ligados por "para" (ex: "tapete para carro")
const aplicacoes = new Set([
  'carro','carros','moto','motos','caminhao','caminhoes','onibus','van','vans',
  'bicicleta','bicicletas','celular','celulares','smartphone','smartphones',
  'notebook','notebooks','computador','computadores','tv','tvs','geladeira','geladeiras',
  'casa','casas','apartamento','apartamentos','escritorio','escritorios',
  'cozinha','cozinhas','banheiro','banheiros','quarto','quartos','jardim','jardins',
  'pet','pets','cachorro','cachorros','gato','gatos','bebe','bebes',
  'idoso','idosos','crianca','criancas','academia','academias','escola','escolas',
]);

// padrões de pergunta que aparecem soltos no fim da keyword e devem vir para o início
// (ex: "eixo cardan para que serve" -> "para que serve o eixo cardan")
const perguntas = [
  ['para','que','serve'],
  ['pra','que','serve'],
  ['como','funciona'],
  ['como','usar'],
  ['como','instalar'],
  ['como','trocar'],
  ['quanto','custa'],
  ['quanto','dura'],
  ['onde','fica'],
  ['quando','trocar'],
];

function normalizar(str) {
  return str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,'');
}

function combinaSufixo(tokensNorm, padrao) {
  if (tokensNorm.length <= padrao.length) return false;
  const inicio = tokensNorm.length - padrao.length;
  return padrao.every((p,i) => tokensNorm[inicio+i] === p);
}

function artigo(nucleoTokens) {
  if (!nucleoTokens.length) return 'o';
  // o gênero é dado pelo substantivo principal (primeira palavra do núcleo)
  const principal = normalizar(nucleoTokens[0]);
  return /(a|cao|sao|dade|agem)$/.test(principal) ? 'a' : 'o';
}

function detectarLocalizacao(tokens) {
  const joined = tokens.join(' ');
  for (const c of cidades) {
    if (joined.includes(normalizar(c))) return c;
  }
  for (const t of tokens) {
    if (estados.includes(normalizar(t))) return t.toUpperCase();
  }
  return null;
}

function naturalizar(kw) {
  const tokens = kw.trim().split(/\s+/);
  const norm = tokens.map(normalizar);
  const localizacao = detectarLocalizacao(norm);

  let nucleoTokens = [];
  for (let i=0;i<tokens.length;i++) {
    const n = norm[i];
    if (estados.includes(n)||(localizacao&&localizacao.toLowerCase().includes(tokens[i].toLowerCase()))) continue;
    nucleoTokens.push(tokens[i]);
  }
  if (localizacao) {
    const locNorm = normalizar(localizacao);
    nucleoTokens = nucleoTokens.filter(t=>!locNorm.includes(normalizar(t)));
  }

  const loc = localizacao ? ` em ${localizacao}` : '';

  // remove conectivo que já ligava o núcleo à localização (ex: "...em sp" -> não duplicar "em")
  const conectivosLoc = new Set(['em','no','na','para','de']);
  if (localizacao) {
    while (nucleoTokens.length && conectivosLoc.has(normalizar(nucleoTokens[nucleoTokens.length-1]))) {
      nucleoTokens.pop();
    }
  }

  if (nucleoTokens.length === 0) {
    return localizacao ? localizacao : kw.toLowerCase();
  }

  // pergunta solta no fim da keyword (ex: "eixo cardan para que serve") vai para o início
  const nucleoNorm = nucleoTokens.map(normalizar);
  const padraoPergunta = perguntas.find(p => combinaSufixo(nucleoNorm, p));
  if (padraoPergunta) {
    const resto = nucleoTokens.slice(0, nucleoTokens.length - padraoPergunta.length);
    const frase = `${padraoPergunta.join(' ')} ${artigo(resto)} ${resto.join(' ')}`;
    return `${frase.toLowerCase()}${loc}`;
  }

  // procura uma palavra que pede complemento ligado por "de" em qualquer posição
  // (ex: "cabo elétrico preço" -> "preço de cabo elétrico")
  // palavras de preço/orçamento têm prioridade: governam a frase mesmo se vierem no fim
  // (ex: "reparo de eixo cardan industrial preço" -> "preço de reparo de eixo cardan industrial")
  const precoWords = new Set(['preco','precos','valor','valores','orcamento','cotacao','tabela']);
  let headIdx = nucleoTokens.findIndex(t => precoWords.has(normalizar(t)));
  if (headIdx === -1) headIdx = nucleoTokens.findIndex(t => precisaDe.has(normalizar(t)));

  let frase;
  if (headIdx !== -1) {
    const headWord = nucleoTokens[headIdx];
    let resto = nucleoTokens.filter((_, i) => i !== headIdx).join(' ');
    // evita "fornecedor de de cabos" quando a keyword já traz o "de"
    resto = resto.replace(/^de\s+/i, '');
    frase = resto ? `${headWord} de ${resto}` : headWord;
  } else if (
    nucleoTokens.length > 1 &&
    aplicacoes.has(normalizar(nucleoTokens[nucleoTokens.length-1])) &&
    !['para','pra','de','do','da'].includes(normalizar(nucleoTokens[nucleoTokens.length-2]))
  ) {
    // ex: "eixo cardan carro" -> "eixo cardan para carro"
    const alvo = nucleoTokens[nucleoTokens.length-1];
    const principal = nucleoTokens.slice(0,-1).join(' ');
    frase = `${principal} para ${alvo}`;
  } else {
    frase = nucleoTokens.join(' ');
  }

  return `${frase.toLowerCase()}${loc}`;
}

// UI
const input = document.getElementById('kwInput');
const tagsEl = document.getElementById('tags');
const emptyMsg = document.getElementById('emptyMsg');
const resultsEl = document.getElementById('resultsEl');

input.addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); addKeyword(); } });

function addKeyword() {
  const linhas = input.value.split('\n').map(l=>l.trim()).filter(Boolean);
  linhas.forEach(val=>{
    if (!keywords.includes(val)) keywords.push(val);
  });
  input.value='';
  renderTags();
  run();
}

function removeKeyword(idx) {
  keywords.splice(idx,1);
  renderTags();
  run();
}

function renderTags() {
  tagsEl.innerHTML='';
  if (keywords.length===0) { tagsEl.appendChild(emptyMsg); return; }
  keywords.forEach((kw,i)=>{
    const tag=document.createElement('div');
    tag.className='tag';
    tag.innerHTML=`<span>${kw}</span><button onclick="removeKeyword(${i})">×</button>`;
    tagsEl.appendChild(tag);
  });
}

function run() {
  resultsEl.innerHTML='';
  let exibidos=0;
  keywords.forEach((kw)=>{
    const naturalizada=naturalizar(kw);
    if (naturalizada === kw.trim().toLowerCase()) return;

    const card=document.createElement('div');
    card.className='result-card';
    card.style.animationDelay=`${exibidos*0.08}s`;
    exibidos++;
    const body=document.createElement('div');
    body.className='result-body';
    const origin=document.createElement('div');
    origin.className='result-origin';
    origin.textContent=`"${kw}"`;
    const text=document.createElement('div');
    text.className='result-text';
    text.textContent=naturalizada;
    body.appendChild(origin);
    body.appendChild(text);
    card.appendChild(body);

    const btn=document.createElement('button');
    btn.className='btn-copy';
    btn.textContent='copiar';
    btn.onclick=()=>{
      navigator.clipboard.writeText(naturalizada).then(()=>{
        btn.textContent='copiado ✓';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='copiar'; btn.classList.remove('copied'); },1800);
      });
    };
    card.appendChild(btn);

    resultsEl.appendChild(card);
  });

  if (keywords.length>0 && exibidos===0) {
    const msg=document.createElement('p');
    msg.className='empty-msg';
    msg.textContent='Nenhuma keyword precisou de ajuste — todas já estão naturais.';
    resultsEl.appendChild(msg);
  }
}
</script>
</body>
</html>
