<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naturalizador de Keywords SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text-muted: #888480;
      --text-dim: #555250;
      --accent: #c9b97a;
      --accent-dim: rgba(201,185,122,0.12);
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    header p {
      margin-top: 0.75rem;
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus { border-color: var(--border-hover); }

    .btn-add {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 16px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-add:hover { border-color: var(--border-hover); color: var(--text); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
      margin-bottom: 1.5rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 0.5px solid rgba(201,185,122,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(201,185,122,0.5);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag button:hover { color: var(--accent); }

    .empty-msg {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      padding: 4px 0;
    }

    .btn-run {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-run:hover { opacity: 0.9; }
    .btn-run:active { transform: scale(0.99); }
    .btn-run:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .results {
      width: 100%;
      max-width: 560px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .result-origin {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
      gap: 12px;
    }

    .suggestion:last-child { border-bottom: none; }

    .suggestion span {
      font-size: 14px;
      color: var(--text);
      font-weight: 300;
      line-height: 1.4;
    }

    .btn-copy {
      background: none;
      border: 0.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-copy:hover { border-color: var(--border-hover); color: var(--text-muted); }
    .btn-copy.copied { color: var(--accent); border-color: rgba(201,185,122,0.3); }

    footer {
      margin-top: 4rem;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      .input-row { flex-direction: column; }
      .btn-add { padding: 10px; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">ferramenta SEO</p>
  <h1>Naturalizador de Keywords</h1>
  <p>Cole uma palavra-chave SEO e receba a versão naturalizada, com conectivos, para usar no seu texto.</p>
</header>

<div class="card">
  <p class="field-label">Palavras-chave</p>
  <div class="input-row">
    <input type="text" id="kwInput" placeholder="ex: fornecedor cabo elétrico sp" autocomplete="off" />
    <button class="btn-add" onclick="addKeyword()">+ Adicionar</button>
  </div>
  <div class="tags" id="tags">
    <span class="empty-msg" id="emptyMsg">Nenhuma keyword adicionada ainda.</span>
  </div>
  <button class="btn-run" id="runBtn" onclick="run()" disabled>Naturalizar keywords</button>
</div>

<div class="results" id="resultsEl"></div>

<footer>feito por <a href="https://www.linkedin.com/in/tati-redatora/" target="_blank">tati redatora</a></footer>

<script>
const keywords = [];

const estados = ['ac','al','ap','am','ba','ce','df','es','go','ma','mt','ms','mg','pa','pb','pr','pe','pi','rj','rn','rs','ro','rr','sc','sp','se','to'];
const cidades = ['sao paulo','são paulo','rio de janeiro','belo horizonte','curitiba','porto alegre','fortaleza','recife','salvador','manaus','campinas','santo andre','guarulhos','osasco','sorocaba','ribeirao preto','ribeirão preto','santos'];

// substantivos cujo complemento é naturalmente ligado por "de" (ex: "fornecedor de cabos")
const precisaDe = new Set([
  'fornecedor','fornecedores','fabricante','fabricantes','distribuidor','distribuidores',
  'loja','lojas','empresa','empresas','especialista','especialistas',
  'instalacao','instalador','instaladora','manutencao','servico','servicos',
  'preco','precos','valor','valores','orcamento','cotacao','tabela',
  'aluguel','conserto','reparo','reparos','troca','venda','vendas','fornecimento',
]);

function normalizar(str) {
  return str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,'');
}

function detectarLocalizacao(tokens) {
  const joined = tokens.join(' ');
  for (const c of cidades) {
    if (joined.includes(c)) return c.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  }
  for (const t of tokens) {
    if (estados.includes(normalizar(t))) return t.toUpperCase();
  }
  return null;
}

function capitalize(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

function naturalizar(kw) {
  const tokens = kw.trim().split(/\s+/);
  const norm = tokens.map(normalizar);
  const localizacao = detectarLocalizacao(norm);

  let nucleoTokens = [];
  for (let i=0;i<tokens.length;i++) {
    const n = norm[i];
    if (estados.includes(n)||(localizacao&&localizacao.toLowerCase().includes(tokens[i].toLowerCase()))) continue;
    nucleoTokens.push(tokens[i]);
  }
  if (localizacao) {
    const locNorm = normalizar(localizacao);
    nucleoTokens = nucleoTokens.filter(t=>!locNorm.includes(normalizar(t)));
  }

  const loc = localizacao ? ` em ${localizacao}` : '';

  // remove conectivo que já ligava o núcleo à localização (ex: "...em sp" -> não duplicar "em")
  const conectivosLoc = new Set(['em','no','na','para','de']);
  if (localizacao) {
    while (nucleoTokens.length && conectivosLoc.has(normalizar(nucleoTokens[nucleoTokens.length-1]))) {
      nucleoTokens.pop();
    }
  }

  if (nucleoTokens.length === 0) {
    return localizacao ? capitalize(localizacao) : kw;
  }

  const cabeca = normalizar(nucleoTokens[0]);
  let resto = nucleoTokens.slice(1).join(' ');
  // evita "fornecedor de de cabos" quando a keyword já traz o "de"
  resto = resto.replace(/^de\s+/i, '');

  const frase = (precisaDe.has(cabeca) && resto)
    ? `${nucleoTokens[0]} de ${resto}`
    : nucleoTokens.join(' ');

  return capitalize(`${frase}${loc}`);
}

// UI
const input = document.getElementById('kwInput');
const tagsEl = document.getElementById('tags');
const emptyMsg = document.getElementById('emptyMsg');
const runBtn = document.getElementById('runBtn');
const resultsEl = document.getElementById('resultsEl');

input.addEventListener('keydown', e=>{ if(e.key==='Enter') addKeyword(); });

function addKeyword() {
  const val = input.value.trim();
  if (!val||keywords.includes(val)) { input.value=''; return; }
  keywords.push(val);
  input.value='';
  renderTags();
}

function removeKeyword(idx) {
  keywords.splice(idx,1);
  renderTags();
}

function renderTags() {
  tagsEl.innerHTML='';
  if (keywords.length===0) { tagsEl.appendChild(emptyMsg); runBtn.disabled=true; return; }
  runBtn.disabled=false;
  keywords.forEach((kw,i)=>{
    const tag=document.createElement('div');
    tag.className='tag';
    tag.innerHTML=`<span>${kw}</span><button onclick="removeKeyword(${i})">×</button>`;
    tagsEl.appendChild(tag);
  });
}

function run() {
  resultsEl.innerHTML='';
  keywords.forEach((kw,idx)=>{
    const naturalizada=naturalizar(kw);
    const card=document.createElement('div');
    card.className='result-card';
    card.style.animationDelay=`${idx*0.08}s`;
    const origin=document.createElement('div');
    origin.className='result-origin';
    origin.textContent=`"${kw}"`;
    card.appendChild(origin);

    const row=document.createElement('div');
    row.className='suggestion';
    const span=document.createElement('span');
    span.textContent=naturalizada;
    const btn=document.createElement('button');
    btn.className='btn-copy';
    btn.textContent='copiar';
    btn.onclick=()=>{
      navigator.clipboard.writeText(naturalizada).then(()=>{
        btn.textContent='copiado ✓';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='copiar'; btn.classList.remove('copied'); },1800);
      });
    };
    row.appendChild(span);
    row.appendChild(btn);
    card.appendChild(row);

    resultsEl.appendChild(card);
  });
}
</script>
</body>
</html>
