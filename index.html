<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naturalizador de Keywords SEO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05070d;
      --panel: #0a0d14;
      --panel-2: #0f1420;
      --border: #1e2840;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --accent-dim: rgba(79,140,255,0.12);
      --output-bg: #06080f;
      --footer: #8f9ab3;
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }
    * { scrollbar-color: var(--panel-2) var(--bg); scrollbar-width: thin; }

    header {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    header .eyebrow {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
    }

    header p {
      margin-top: 0.75rem;
      font-size: 15px;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }

    .field-label {
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1rem;
    }

    textarea#kwInput {
      width: 100%;
      resize: vertical;
      min-height: 64px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    textarea#kwInput::placeholder { color: var(--muted); }
    textarea#kwInput:focus { border-color: var(--accent); }

    .input-actions {
      display: flex;
      align-self: flex-end;
      gap: 8px;
    }

    .btn-add, .btn-clear {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-add:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
    .btn-clear:hover { border-color: #d9534f; color: var(--text); background: rgba(217,83,79,0.12); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,140,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 14px;
      color: var(--accent);
      font-family: Arial, sans-serif;
      font-weight: 400;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(79,140,255,0.6);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag button:hover { color: var(--accent); }

    .empty-msg {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      padding: 4px 0;
    }

    .results-wrap {
      width: 100%;
      max-width: 560px;
      margin-top: 1.5rem;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .results-title {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .results {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--output-bg);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 1rem 1.4rem;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
      transition: border-color 0.2s, background 0.2s;
    }

    .result-row:first-child {
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
    }

    .result-row:last-child {
      border-bottom: 1px solid var(--border);
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
    }

    .result-row:hover {
      border-color: var(--accent-hover);
      background: var(--panel-2);
    }

    .result-row.unchanged {
      opacity: 0.7;
    }

    .result-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .result-origin {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .result-text {
      font-size: 18px;
      color: var(--text);
      font-weight: 400;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    .btn-copy {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 16px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
    .btn-copy.copied { background: #1a3a1a; color: #6fcf6f; border-color: #3a6a3a; }

    footer {
      margin-top: 4rem;
      font-size: 13px;
      color: var(--footer);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    footer a { color: var(--footer); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      header h1 { font-size: 24px; }
      .result-text { font-size: 17px; }
    }

</head>

// regras gerais para terminações comuns do português que costumam vir sem acento
// (ex: "operacao" -> "operação", "regiao" -> "região", "importancia" -> "importância")
function aplicarRegraSufixo(p) {
  if (p.length > 4 && p.endsWith('coes')) return p.slice(0,-4) + 'ções';
  if (p.length > 3 && p.endsWith('cao')) return p.slice(0,-3) + 'ção';
  if (p.length > 4 && p.endsWith('soes')) return p.slice(0,-4) + 'sões';
  if (p.length > 3 && p.endsWith('sao')) return p.slice(0,-3) + 'são';
  if (p.length > 4 && p.endsWith('ioes')) return p.slice(0,-4) + 'iões';
  if (p.length > 3 && p.endsWith('iao')) return p.slice(0,-3) + 'ião';
  if (p.length > 6 && p.endsWith('encias')) return p.slice(0,-6) + 'ências';
  if (p.length > 5 && p.endsWith('encia')) return p.slice(0,-5) + 'ência';
  if (p.length > 6 && p.endsWith('ancias')) return p.slice(0,-6) + 'âncias';
  if (p.length > 5 && p.endsWith('ancia')) return p.slice(0,-5) + 'ância';
  if (p.length > 5 && p.endsWith('ancas')) return p.slice(0,-5) + 'anças';
  if (p.length > 4 && p.endsWith('anca')) return p.slice(0,-4) + 'ança';
  return null;
}


function normalizar(str) {
  return str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,'');
}

function combinaSufixo(tokensNorm, padrao) {
  if (tokensNorm.length <= padrao.length) return false;
  const inicio = tokensNorm.length - padrao.length;
  return padrao.every((p,i) => tokensNorm[inicio+i] === p);
}

function artigo(nucleoTokens) {
  if (!nucleoTokens.length) return 'o';
  // o gênero é dado pelo substantivo principal (primeira palavra do núcleo)
  const principal = normalizar(nucleoTokens[0]);
  return /(a|cao|sao|dade|agem)$/.test(principal) ? 'a' : 'o';
}

function detectarLocalizacao(tokens) {
  const joined = tokens.join(' ');
  for (const c of cidades) {
    if (joined.includes(normalizar(c))) return c;
  }
  for (const t of tokens) {
    if (estados.includes(normalizar(t))) return t.toUpperCase();
  }
  return null;
}

const conectivos = new Set(['de','da','do','das','dos','em','no','na','nos','nas','para','pra','com','sem','sobre','e','um','uma','uns','umas']);
const precoWords = new Set(['preco','precos','valor','valores','orcamento','cotacao','tabela']);
const preposicoesLocal = new Set(['em','no','na','nos','nas']);

// vocabulário "comum" conhecido pela ferramenta — qualquer outra palavra após uma
// preposição de lugar (em/no/na) é tratada como nome próprio (bairro, região, etc.)
const palavrasComuns = new Set([
  ...conectivos,
  ...precoWords,
  ...precisaDe,
  ...aplicacoes,
  ...perguntas.flat(),
  ...estados,
  ...Object.keys(correcoesAcento),
  ...Object.values(correcoesAcento).map(normalizar),
  'domicilio','local','geral','online','centro','interior','exterior','setor','sistema',
]);

// palavras comuns que também costumam abrir nomes de bairros/regiões
// (ex: "Jardim Paulista", "Vila Mariana") — só viram parte do nome próprio
// se vierem acompanhadas de outra palavra desconhecida em seguida
const ambiguosLocal = new Set(['jardim','jardins','vila','parque']);

// substantivos que indicam que o que vem a seguir (ligado por "do/da/dos/das") é um nome de lugar
// (ex: "bairro do ipiranga" -> "bairro do Ipiranga")
const palavrasLugar = new Set(['bairro','bairros','regiao','regioes','zona','zonas','distrito','distritos']);
const ligacoesLugar = new Set(['do','da','dos','das']);

// capitaliza o nome próprio (bairro, região, etc.) que aparece após "em/no/na" (ou após
// "bairro do/região da") quando não é uma palavra (ou sequência de palavras) conhecida
// do vocabulário comum
// (ex: "funilaria no ipiranga" -> "funilaria no Ipiranga", "oficina no jardim paulista" -> "oficina no Jardim Paulista")
function capitalizarLocalDesconhecido(frase) {
  const partes = frase.split(' ');
  let i = partes.length - 1;
  while (i >= 0 && !palavrasComuns.has(normalizar(partes[i]))) {
    i--;
  }
  // se houver pelo menos uma palavra desconhecida no fim e a palavra anterior for
  // ambígua (ex: "jardim"), considera que ela faz parte do nome do lugar
  if (i >= 0 && i < partes.length - 1 && ambiguosLocal.has(normalizar(partes[i]))) {
    i--;
  }
  const ehPreposicaoLocal = i >= 0 && preposicoesLocal.has(normalizar(partes[i]));
  const ehLigacaoLugar = i > 0 && ligacoesLugar.has(normalizar(partes[i])) && palavrasLugar.has(normalizar(partes[i-1]));
  if (i < partes.length - 1 && (ehPreposicaoLocal || ehLigacaoLugar)) {
    for (let j = i+1; j < partes.length; j++) {
      partes[j] = partes[j].charAt(0).toUpperCase() + partes[j].slice(1);
    }
  }
  return partes.join(' ');
}

function naturalizar(kw) {
  const tokens = kw.trim().split(/\s+/).map(t => {
    const n = normalizar(t);
    return correcoesAcento[n] || aplicarRegraSufixo(n) || t;
  });
  const norm = tokens.map(normalizar);
  const localizacao = detectarLocalizacao(norm);

  let nucleoTokens = [];
  for (let i=0;i<tokens.length;i++) {
    const n = norm[i];
    if (estados.includes(n)||(localizacao&&localizacao.toLowerCase().includes(tokens[i].toLowerCase()))) continue;
    nucleoTokens.push(tokens[i]);
  }
  if (localizacao) {
    const locNorm = normalizar(localizacao);
    nucleoTokens = nucleoTokens.filter(t=>!locNorm.includes(normalizar(t)));
  }

  const loc = localizacao ? ` em ${localizacao}` : '';

  // remove conectivo que já ligava o núcleo à localização (ex: "...em sp" -> não duplicar "em")
  const conectivosLoc = new Set(['em','no','na','para','de']);
  if (localizacao) {
    while (nucleoTokens.length && conectivosLoc.has(normalizar(nucleoTokens[nucleoTokens.length-1]))) {
      nucleoTokens.pop();
    }
  }

  if (nucleoTokens.length === 0) {
    return localizacao ? localizacao : capitalizarLocalDesconhecido(kw.toLowerCase());
  }

  // pergunta solta no fim da keyword (ex: "eixo cardan para que serve") vai para o início
  const nucleoNorm = nucleoTokens.map(normalizar);
  const padraoPergunta = perguntas.find(p => combinaSufixo(nucleoNorm, p));
  if (padraoPergunta) {
    const resto = nucleoTokens.slice(0, nucleoTokens.length - padraoPergunta.length);
    const frase = `${padraoPergunta.join(' ')} ${artigo(resto)} ${resto.join(' ')}`;
    return `${capitalizarLocalDesconhecido(frase.toLowerCase())}${loc}`;
  }

  // procura uma palavra que pede complemento ligado por "de" em qualquer posição
  // (ex: "cabo elétrico preço" -> "preço de cabo elétrico")
  // palavras de preço/orçamento têm prioridade: governam a frase mesmo se vierem no fim
  // (ex: "reparo de eixo cardan industrial preço" -> "preço de reparo de eixo cardan industrial")
  let headIdx = nucleoTokens.findIndex(t => precoWords.has(normalizar(t)));
  if (headIdx === -1) headIdx = nucleoTokens.findIndex(t => precisaDe.has(normalizar(t)));

  // se a palavra-chave já liga o termo a um conectivo (de/da/para/em/com/etc.), a frase já é natural
  // (ex: "manutenção de carros blindados", "preço da película antivandalismo", "fornecedor para empresas")
  if (headIdx !== -1 && (
    conectivos.has(normalizar(nucleoTokens[headIdx+1] || '')) ||
    conectivos.has(normalizar(nucleoTokens[headIdx-1] || ''))
  )) {
    headIdx = -1;
  }

  let frase;
  if (headIdx !== -1 && headIdx > 0 && headIdx < nucleoTokens.length - 1) {
    // a palavra-chave (ex: "reparos") está no meio da frase, com modificadores antes
    // (ex: "pequenos reparos funilaria" -> "pequenos reparos de funilaria", sem reordenar)
    const antes = nucleoTokens.slice(0, headIdx + 1).join(' ');
    const depois = nucleoTokens.slice(headIdx + 1).join(' ');
    frase = `${antes} de ${depois}`;
  } else if (headIdx !== -1) {
    const headWord = nucleoTokens[headIdx];
    let resto = nucleoTokens.filter((_, i) => i !== headIdx).join(' ');
    // evita "fornecedor de de cabos" quando a keyword já traz o "de"
    resto = resto.replace(/^de\s+/i, '');
    frase = resto ? `${headWord} de ${resto}` : headWord;
  } else if (
    nucleoTokens.length > 1 &&
    aplicacoes.has(normalizar(nucleoTokens[nucleoTokens.length-1])) &&
    !conectivos.has(normalizar(nucleoTokens[nucleoTokens.length-2]))
  ) {
    // ex: "eixo cardan carro" -> "eixo cardan para carro"
    const alvo = nucleoTokens[nucleoTokens.length-1];
    const principal = nucleoTokens.slice(0,-1).join(' ');
    frase = `${principal} para ${alvo}`;
  } else {
    frase = nucleoTokens.join(' ');
  }

  return `${capitalizarLocalDesconhecido(frase.toLowerCase())}${loc}`;
}

// UI
const input = document.getElementById('kwInput');
const tagsEl = document.getElementById('tags');
const emptyMsg = document.getElementById('emptyMsg');
const resultsEl = document.getElementById('resultsEl');
const resultsWrap = document.getElementById('resultsWrap');
const btnCopyAll = document.getElementById('btnCopyAll');

input.addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); addKeyword(); } });

function addKeyword() {
  const linhas = input.value.split('\n').map(l=>l.trim()).filter(Boolean);
  linhas.forEach(val=>{
    if (!keywords.includes(val)) keywords.push(val);
  });
  input.value='';
  renderTags();
  run();
}

function removeKeyword(idx) {
  keywords.splice(idx,1);
  renderTags();
  run();
}

function limparKeywords() {
  keywords.length = 0;
  input.value = '';
  renderTags();
  run();
}

function renderTags() {
  tagsEl.innerHTML='';
  if (keywords.length===0) { tagsEl.appendChild(emptyMsg); return; }
  keywords.forEach((kw,i)=>{
    const tag=document.createElement('div');
    tag.className='tag';
    tag.innerHTML=`<span>${kw}</span><button onclick="removeKeyword(${i})">×</button>`;
    tagsEl.appendChild(tag);
  });
}

function run() {
  resultsEl.innerHTML='';

  if (keywords.length === 0) {
    resultsWrap.style.display = 'none';
    return;
  }
  resultsWrap.style.display = '';

  const naturalizadas = keywords.map(kw=>{
    const naturalizada=naturalizar(kw);
    const alterada = naturalizada !== kw.trim().toLowerCase();

    const row=document.createElement('div');
    row.className = alterada ? 'result-row' : 'result-row unchanged';

    const body=document.createElement('div');
    body.className='result-body';
    if (alterada) {
      const origin=document.createElement('div');
      origin.className='result-origin';
      origin.textContent=`"${kw}"`;
      body.appendChild(origin);
    }
    const text=document.createElement('div');
    text.className='result-text';
    text.textContent=naturalizada;
    body.appendChild(text);
    row.appendChild(body);

    resultsEl.appendChild(row);
    return naturalizada;
  });

  btnCopyAll.onclick=()=>{
    navigator.clipboard.writeText(naturalizadas.join('\n')).then(()=>{
      btnCopyAll.textContent='copiado ✓';
      btnCopyAll.classList.add('copied');
      setTimeout(()=>{ btnCopyAll.textContent='copiar tudo'; btnCopyAll.classList.remove('copied'); },1800);
    });
  };
}
</script>
